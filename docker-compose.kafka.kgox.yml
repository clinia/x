# for Watermill development purposes.
# For Watermill based application docker please check https://watermill.io/docs/getting-started/
# Confluent Platform 8.x uses KRaft mode (ZooKeeper removed).

services:
  kafka1:
    image: confluentinc/cp-kafka:8.1.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: alN2lfZjQd6CKFHM6GXSUw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:39091,2@kafka2:39092,3@kafka3:39093
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9091,INTERNAL://0.0.0.0:29091,CONTROLLER://0.0.0.0:39091
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9091,INTERNAL://kafka1:29091
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_MESSAGE_MAX_BYTES: 200000000
      KAFKA_REPLICA_FETCH_MAX_BYTES: 200000000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_LOG4J_LOGGERS: kafka.authorizer.logger=INFO
    ports:
      # Expose as 9991 so toxiproxy can sit in front of 9091
      - 9991:9091
    restart: unless-stopped

  kafka2:
    image: confluentinc/cp-kafka:8.1.1
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: alN2lfZjQd6CKFHM6GXSUw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:39091,2@kafka2:39092,3@kafka3:39093
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:39092
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka2:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_MESSAGE_MAX_BYTES: 200000000
      KAFKA_REPLICA_FETCH_MAX_BYTES: 200000000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_LOG4J_LOGGERS: kafka.authorizer.logger=INFO
    ports:
      # Expose as 9992 so toxiproxy can sit in front of 9092
      - 9992:9092
    restart: unless-stopped

  kafka3:
    image: confluentinc/cp-kafka:8.1.1
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: alN2lfZjQd6CKFHM6GXSUw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:39091,2@kafka2:39092,3@kafka3:39093
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9093,INTERNAL://0.0.0.0:29093,CONTROLLER://0.0.0.0:39093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9093,INTERNAL://kafka3:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_MESSAGE_MAX_BYTES: 200000000
      KAFKA_REPLICA_FETCH_MAX_BYTES: 200000000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_LOG4J_LOGGERS: kafka.authorizer.logger=INFO
    ports:
      # Expose as 9993 so toxiproxy can sit in front of 9093
      - 9993:9093
    restart: unless-stopped

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy
    command: -host=0.0.0.0 --config /toxiconfig.json
    network_mode: host
    volumes:
      - ./toxiproxy.kafka.json:/toxiconfig.json
